services:
  ice-cream-translator:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ice_cream_container
    shm_size: '8gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    environment:
      - HF_HOME=/workspace/models/cache
      - TOKENIZERS_PARALLELISM=true
      - OMP_NUM_THREADS=4
    ports:
      - "8000:8000"
    volumes:
      - ./server/main.py:/workspace/main.py
    ipc: host
